{% extends "base.html" %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="container">
    <h1>Редактирование профиля</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>
    <p><a href="{% url 'blog:profile' user.username %}">Вернуться в профиль</a></p>
</div>
{% endblock %}
